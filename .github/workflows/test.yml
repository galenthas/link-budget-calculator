name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@v5
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: mingw-${{ runner.os }}-13

      - name: Install MinGW-w64
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: choco install mingw --no-progress -y

      - name: Build test binary
        run: gcc -Wall -Wextra -std=c11 -O2 linkbudget_core.c test_linkbudget.c -o test_linkbudget -lm
        shell: cmd

      - name: Run tests
        id: run-tests
        run: test_linkbudget.exe 2>&1 | tee test_output.txt
        shell: cmd

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build GUI
        run: |
          windres app.rc -O coff -o app.res
          gcc -Wall -Wextra -std=c11 -O2 ^
            linkbudget_gui.c linkbudget_ui_controls.c linkbudget_ui_logic.c ^
            linkbudget_ui_io.c linkbudget_pdf.c linkbudget_core.c app.res ^
            -o "Link Budget Calculator.exe" -lcomctl32 -lcomdlg32 -mwindows -lm
        shell: cmd

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: Link Budget Calculator
          path: "Link Budget Calculator.exe"

  release:
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@v5
        with:
          path: C:\ProgramData\chocolatey\lib\mingw
          key: mingw-${{ runner.os }}-13

      - name: Install MinGW-w64
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        run: choco install mingw --no-progress -y

      - name: Build release executable
        run: |
          windres app.rc -O coff -o app.res
          gcc -Wall -Wextra -std=c11 -O2 ^
            linkbudget_gui.c linkbudget_ui_controls.c linkbudget_ui_logic.c ^
            linkbudget_ui_io.c linkbudget_pdf.c linkbudget_core.c app.res ^
            -o "Link Budget Calculator.exe" -lcomctl32 -lcomdlg32 -mwindows -lm
        shell: cmd

      - name: Build installer
        run: |
          choco install innosetup --no-progress -y
          iscc /DMyAppVersion=${{ github.ref_name }} installer.iss
        shell: cmd

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Link Budget Calculator.exe
            installer_out\*.exe
          generate_release_notes: true
